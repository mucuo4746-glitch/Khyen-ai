<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khyen མཁྱེན། AI - 藏文化智慧空间</title>
    <style>
        /* 1. 基础底色：从暗沉转为通透的冰川灰白 */
        body {
            margin: 0;
            padding: 0;
            background: #f8f9fa; /* 极浅的灰白色，像雪山初晴 */
            color: #2c3e50;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
        }

        /* 2. 顶部导航：保留文化符号，但做得更轻盈 */
        .header {
            background: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-bottom: 3px solid #d4a017;
        }

        .title {
            font-size: 32px;
            font-weight: 800;
            color: #1a0f0a;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        .subtitle {
            font-size: 14px;
            color: #8b956a;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 3. 进入按钮：改为现代化的悬浮感设计 */
        .enter-btn-wrap {
            padding: 40px 0;
            text-align: center;
        }

        .enter-btn {
            background: #d4a017;
            color: white;
            text-decoration: none;
            padding: 15px 45px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(212, 160, 23, 0.3);
            transition: all 0.3s ease;
            display: inline-block;
        }

        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 160, 23, 0.4);
            background: #b88a14;
        }

        /* 4. 功能卡片：现代大气的大色块布局 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #d4a017;
            transform: translateY(-5px);
        }

        .card h3 { color: #d4a017; margin-top: 0; }
        .card p { color: #666; line-height: 1.6; font-size: 14px; }
        
        .icon { font-size: 40px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="subtitle">Intelligence Rooted in Tibetan Wisdom</div>
        <div class="title">Khyen མཁྱེན། AI</div>
        <div style="font-size: 18px; color: #d4a017; margin-top: 10px;">藏文化 AI 智库平台</div>
    </div>

    <div class="enter-btn-wrap">
        <a href="/chat" class="enter-btn">开启智慧对话 · Start Exploration</a>
    </div>

    <div class="container">
        <div class="card">
            <span class="icon">🏮</span>
            <h3>文化百科</h3>
            <p>探索唐卡艺术、藏医药学及深邃的哲学思想。</p>
        </div>
        <div class="card">
            <span class="icon">📜</span>
            <h3>文献转译</h3>
            <p>基于深度学习的汉藏翻译与古籍解读助手。</p>
        </div>
        <div class="card">
            <span class="icon">🏔️</span>
            <h3>圣境导引</h3>
            <p>为您规划富有灵魂的雪域高原文化之旅。</p>
        </div>
    </div>

</body>
</html>
